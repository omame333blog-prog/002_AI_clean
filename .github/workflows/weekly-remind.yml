name: 週次リマインド（月曜）

on:
  schedule:
    - cron: '30 0 * * 1'  # 毎週月曜 9:30 JST
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: リマインド投稿
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python post_weekly_remind.py
