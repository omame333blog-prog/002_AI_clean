name: リスト更新リマインド（毎月2日）

on:
  schedule:
    - cron: '5 0 2 * *'  # 毎月2日 9:05 JST
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: リスト更新リマインド投稿
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python post_list_reminder.py
