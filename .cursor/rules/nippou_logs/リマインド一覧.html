<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日報リマインド一覧</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 1.25rem; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #f5f5f5; }
    .remind { background: #ffebee; }
    .ok { background: #e8f5e9; }
    .msg { cursor: pointer; padding: 4px 8px; background: #eee; border-radius: 4px; font-size: 0.9em; }
    .msg:hover { background: #ddd; }
    .days { font-weight: bold; }
  </style>
</head>
<body>
  <h1>日報リマインド一覧（レッドの部屋）</h1>
  <p>基準日: 2026-03-14　要リマインド：2週間以上未提出 or 一度も未提出</p>
  <table>
    <thead>
      <tr><th>名前</th><th>最終提出日</th><th>経過</th><th>コピペ用メッセージ</th></tr>
    </thead>
    <tbody>
      <!-- 要リマインド（未提出者＝ロールにいるが一度も出していない人） -->
      <tr class="remind">
        <td>鈴木</td><td>未提出</td><td class="days">—</td>
        <td class="msg" onclick="navigator.clipboard.writeText(this.dataset.msg)" data-msg="@鈴木 日報まだ出てないよ！出してね！">@鈴木 日報まだ出てないよ！出してね！</td>
      </tr>
      <tr class="remind">
        <td>高橋</td><td>未提出</td><td class="days">—</td>
        <td class="msg" onclick="navigator.clipboard.writeText(this.dataset.msg)" data-msg="@高橋 日報まだ出てないよ！出してね！">@高橋 日報まだ出てないよ！出してね！</td>
      </tr>
      <!-- 提出済み（14日以内） -->
      <tr class="ok">
        <td>山田</td><td>2026-03-13</td><td class="days">1日</td>
        <td class="msg" onclick="navigator.clipboard.writeText(this.dataset.msg)" data-msg="@山田 最近どうした？03/13以来だよ！">@山田 最近どうした？03/13以来だよ！</td>
      </tr>
      <tr class="ok">
        <td>田中</td><td>2026-03-12</td><td class="days">2日</td>
        <td class="msg" onclick="navigator.clipboard.writeText(this.dataset.msg)" data-msg="@田中 最近どうした？03/12以来だよ！">@田中 最近どうした？03/12以来だよ！</td>
      </tr>
      <tr class="ok">
        <td>佐藤</td><td>2026-03-11</td><td class="days">3日</td>
        <td class="msg" onclick="navigator.clipboard.writeText(this.dataset.msg)" data-msg="@佐藤 最近どうした？03/11以来だよ！">@佐藤 最近どうした？03/11以来だよ！</td>
      </tr>
    </tbody>
  </table>
  <p><strong>要リマインド：</strong> 2名（鈴木・高橋＝一度も未提出）</p>
</body>
</html>
